<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post</title>

<style>

body{
    background:#f4f6f9;
    font-family:Arial,sans-serif;
}

.page-header{
    background:white;
    color:blue;
    padding:15px;
    text-align:center;
}

.container{
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:bold;
}

textarea{
    width:100%;
    min-height:150px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    resize:vertical;
}

input[type="datetime-local"]{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

input[type="file"]{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    background:#fff;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.ai-btn{
    background:#6f42c1;
    color:white;
}

.preview-btn{
    background:#28a745;
    color:white;
}

.save-btn{
    background:#1877f2;
    color:white;
}

.media-preview{
    margin-top:15px;
}

.media-preview img{
    width:100%;
    max-height:250px;
    object-fit:cover;
    border-radius:10px;
}

.media-preview video{
    width:100%;
    max-height:300px;
    border-radius:10px;
}

.preview-box{
    background:#f7f7f7;
    border:1px solid #ddd;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.preview-box img{
    width:100%;
    max-height:250px;
    object-fit:cover;
    border-radius:10px;
}

.preview-box video{
    width:100%;
    max-height:300px;
    border-radius:10px;
}

.bottom-nav{
    
 
    left:0;
    right:0;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    
}
a{
    color:blue;
    
    text-decoration: none;
}


/* DARK MODE */
.dark{
    background:#18191a;
    color:white;
}

.dark .page-header{
    background:#242526;
    color:white;
}

.dark .card{
    background:#242526;
    color:white;
}

.dark textarea{
    background:#3a3b3c;
    color:white;
    border:1px solid #555;
}

.dark input[type="datetime-local"]{
    background:#3a3b3c;
    color:white;
    border:1px solid #555;
}

.dark .preview-box{
    background:#3a3b3c;
    color:white;
    border:1px solid #555;
}

.dark .bottom-nav{
    background:#242526;
}


.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;
    background:white;
    display:flex;
    align-items:center;
    padding:0 15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
    z-index:1000;
}
h2{
    color:#ff9800;
}
</style>
</head>
<body>
    <div class="topbar">

        <h2 class="intro"><b> Social Q</b></h2>
    
        <div style="margin-left:auto;">
            <a href="index.html">
                <img src="home.png" width="22">
            </a>
        </div>
    
        <div style="margin-left:auto;">
            <a href="create.html">
                <img src="add.png" width="22">
            </a>
        </div>
    
        <div style="margin-left:auto;">
            <a href="queue.html">
                <img src="queue.png" width="22">
            </a>
        </div>
    
    
        <div style="margin-left:auto;">
            <a href="settings.html">
                <img src="setting.png" width="22">
            </a>
        </div>
    
    </div><br><br>

<div class="page-header">
    <h2>Create Social Q Post</h2>
    <!-- BOTTOM NAV -->

</div>



<div class="container">

    <div class="card">

        <label>Post Content</label>

        <textarea
            id="content"
            placeholder="Write your Facebook content here..."
        ></textarea>

       

        <div
            id="mediaPreview"
            class="media-preview"
        ></div>

        <label>Select Date and Time Below</label>

        <input
            type="datetime-local"
            id="scheduleTime" 
        >

        <button
            class="preview-btn"
            onclick="previewPost()"
        >
            Preview Post
        </button>

        <button
            class="save-btn"
            onclick="savePost()"
        >
            Save Schedule
        </button>

        <button
        class="ai-btn"
        onclick="openAI()"
    >
        ✨ Generate With ChatGPT
    </button>

    </div>

    <div class="card">

        <h3>Post Preview</h3>

        <div
            id="previewArea"
            class="preview-box"
        >
            Nothing to preview yet.
        </div>

    </div>

</div>


<script src="js/db.js"></script>
<script src="js/app.js"></script>

<script>
    
    function applyTheme(){

let theme = localStorage.getItem("theme");

if(theme === "dark"){
    document.body.classList.add("dark");
}else{
    document.body.classList.remove("dark");
}

}


window.addEventListener("load", function(){

applyTheme();

});

let mediaData = "";
let mediaType = "";
document
.getElementById("imageFile")
.addEventListener("change", function(){

    let file = this.files[0];

    if(!file) return;

    mediaType = "image";

    let reader = new FileReader();

    reader.onload = function(e){

        mediaData = e.target.result;

        document.getElementById("mediaPreview").innerHTML =
        `
        <img src="${mediaData}">
        `;

    };

    reader.readAsDataURL(file);

});




function openAI(){

    let topic =
        document.getElementById("content").value;

    if(topic.trim() === ""){

        topic =
        "Write a professional Facebook post";

    }

    let url =
    "https://chatgpt.com/?q=" +
    encodeURIComponent(topic);

    window.open(url, "_blank");

}


function previewPost(){

    let content =
        document.getElementById("content").value;

    let schedule =
        document.getElementById("scheduleTime").value;

    let html = "";

    html += "<p><b>Content:</b></p>";
    html += "<p>" + content + "</p>";

    if(mediaData){

        if(mediaType === "image"){

            html +=
            `
            <br>
            <img
            src="${mediaData}">
            `;

        }

        if(mediaType === "video"){

            html +=
            `
            <br>
            <video controls>
                <source src="${mediaData}">
            </video>
            `;

        }

    }

    html +=
    "<br><br><b>Schedule:</b> " +
    schedule;

    document.getElementById("previewArea")
    .innerHTML = html;

}


function savePost(){

    let content =
        document.getElementById("content")
        .value.trim();

    let scheduleTime =
        document.getElementById("scheduleTime")
        .value;

    if(content === ""){

        alert("Enter content");

        return;

    }

    if(scheduleTime === ""){

        alert("Select schedule time");

        return;

    }

    createPost(
        content,
        mediaData,
        scheduleTime
    );

    alert(
        "Post scheduled successfully"
    );

    document.getElementById("content")
    .value = "";

    document.getElementById("scheduleTime")
    .value = "";

    document.getElementById("imageFile")
    .value = "";

    document.getElementById("videoFile")
    .value = "";

    mediaData = "";
    mediaType = "";

    document.getElementById("mediaPreview")
    .innerHTML = "";

    document.getElementById("previewArea")
    .innerHTML =
    "Nothing to preview yet.";

}

</script>

</body>
</html>
