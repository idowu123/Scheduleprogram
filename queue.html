
<!DOCTYPE html>
<html lang="en">
<head>

<style>
body{

}

    background:#1877f2;
    color:white;

}

.post{

    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
}


.pending{ color:orange; }

    padding:7px;
    border:none;
    border-radius:6px;

}

.dark .header{

    background:white;
    color:white;

    justify-content:space-between;

    margin:0;
    font-size:18px;

.share{ background:#1877f2;color:white; }
.delete{ background:red;color:white; }

small{ color:#666; }






</style>
</head>

<body>


    <div class="header">

        <div style="margin-left:auto;">
            <a href="index.html">
                <img src="home.png" width="22">
            </a>
        </div>
    
        <div style="margin-left:auto;">
            <a href="create.html">
                <img src="add.png" width="22">
            </a>
        </div>
    
        <div style="margin-left:auto;">
            <a href="queue.html">
                <img src="queue.png" width="22">
            </a>
        </div>
    
    
        <div style="margin-left:auto;">
            <a href="settings.html">
                <img src="setting.png" width="22">
            </a>
        </div>
    
        
    
        
    
    </div>
    <h2>Queue Posts</h2>

<div class="container">

    <div class="card">
        <button onclick="loadQueue()">Refresh</button>
        <div id="queue"></div>
    </div>

</div>



<script src="js/theme.js"></script>
<script src="js/worker.js"></script>



<script>
    window.addEventListener("storageUpdate", function(){
    loadUI();
});


window.addEventListener("load", function(){

applyTheme();


});

window.onload = function(){
    loadQueue();
};


/* =========================
LOAD QUEUE
========================= */
function loadQueue(){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    if(posts.length === 0){
        document.getElementById("queue").innerHTML = "No posts";
        return;
    }

    let html = "";

    posts.sort((a,b)=> new Date(a.schedule_time)-new Date(b.schedule_time));

    posts.forEach(p=>{

        html += `
        <div class="post">

            <b>${p.content}</b><br>

            <small>${p.schedule_time}</small><br>

            <div class="${p.status}">
                Status: ${p.status}
            </div>

            <br>

            <button class="copy" onclick="copyPost(${p.id})">
                Copy
            </button>

            <button class="share" onclick="sharePost(${p.id})">
                Share
            </button>

            <button class="delete" onclick="deletePost(${p.id})">
                Delete
            </button>

        </div>
        `;
    });

    document.getElementById("queue").innerHTML = html;
}


/* =========================
COPY (MARK POSTED)
========================= */
function copyPost(id){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p=>{
        if(p.id === id){
            navigator.clipboard.writeText(p.content);
            p.status = "posted";
        }
    });

    localStorage.setItem("posts", JSON.stringify(posts));
    loadQueue();
}


/* =========================
SHARE (MARK POSTED)
========================= */

function sharePost(id){

let posts = JSON.parse(
    localStorage.getItem("posts") || "[]"
);

let post = posts.find(p => p.id === id);

if(!post) return;

navigator.clipboard.writeText(post.content);

alert(
    "Post copied successfully.\n\nOpen Facebook and paste your post."
);

window.open(
    "https://www.facebook.com/",
    "_blank"
);

post.status = "posted";

localStorage.setItem(
    "posts",
    JSON.stringify(posts)
);

loadUI();
}


/* =========================
DELETE
========================= */
function deletePost(id){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts = posts.filter(p => p.id !== id);

    localStorage.setItem("posts", JSON.stringify(posts));

    loadQueue();
}


window.addEventListener("storageUpdate", function(){
    if(typeof loadUI === "function") loadUI();
    if(typeof loadQueue === "function") loadQueue();
});

</script>

</body>
</html>
