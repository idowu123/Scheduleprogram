
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Posts</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.header{
    background:#1877f2;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.post{
    border:1px solid #ddd;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.pending{ color:orange; }
.posted{ color:green; }
.missed{ color:red; }

button{
    padding:7px;
    border:none;
    border-radius:6px;
    margin-right:5px;
    cursor:pointer;
}

.copy{ background:green;color:white; }
.share{ background:#1877f2;color:white; }
.delete{ background:red;color:white; }

small{ color:#666; }

</style>
</head>

<body>

<div class="header">
    <h2>📅 Queue</h2>
</div>

<div class="container">

    <div class="card">
        <button onclick="loadQueue()">Refresh</button>
        <div id="queue"></div>
    </div>

</div>



<script src="js/theme.js"></script>
<script src="js/worker.js"></script>



<script>
    window.addEventListener("storageUpdate", function(){
    loadUI();
});


indow.addEventListener("load", function(){

applyTheme();


});

window.onload = function(){
    loadQueue();
};


/* =========================
LOAD QUEUE
========================= */
function loadQueue(){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    if(posts.length === 0){
        document.getElementById("queue").innerHTML = "No posts";
        return;
    }

    let html = "";

    posts.sort((a,b)=> new Date(a.schedule_time)-new Date(b.schedule_time));

    posts.forEach(p=>{

        html += `
        <div class="post">

            <b>${p.content}</b><br>

            <small>${p.schedule_time}</small><br>

            <div class="${p.status}">
                Status: ${p.status}
            </div>

            <br>

            <button class="copy" onclick="copyPost(${p.id})">
                Copy
            </button>

            <button class="share" onclick="sharePost(${p.id})">
                Share
            </button>

            <button class="delete" onclick="deletePost(${p.id})">
                Delete
            </button>

        </div>
        `;
    });

    document.getElementById("queue").innerHTML = html;
}


/* =========================
COPY (MARK POSTED)
========================= */
function copyPost(id){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p=>{
        if(p.id === id){
            navigator.clipboard.writeText(p.content);
            p.status = "posted";
        }
    });

    localStorage.setItem("posts", JSON.stringify(posts));
    loadQueue();
}


/* =========================
SHARE (MARK POSTED)
========================= */
function sharePost(id){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p=>{
        if(p.id === id){

            let url =
            "https://www.facebook.com/sharer/sharer.php?u=" +
            encodeURIComponent(p.content);

            window.open(url,"_blank");

            p.status = "posted";
        }
    });

    localStorage.setItem("posts", JSON.stringify(posts));
    loadQueue();
}


/* =========================
DELETE
========================= */
function deletePost(id){

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts = posts.filter(p => p.id !== id);

    localStorage.setItem("posts", JSON.stringify(posts));

    loadQueue();
}


window.addEventListener("storageUpdate", function(){
    if(typeof loadUI === "function") loadUI();
    if(typeof loadQueue === "function") loadQueue();
});

</script>

</body>
</html>
