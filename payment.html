<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}

h2,h3{text-align:center;}

.sub{text-align:center;color:#94a3b8;}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

.plan{
    background:#0f172a;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:12px;
    cursor:pointer;
    font-size:16px;
}

.payBtn{background:#22c55e;color:white;}
.reqBtn{background:#3b82f6;color:white;}
.backBtn{background:#64748b;color:white;}

.deviceBox{
    display:none;
    margin-top:15px;
    background:#0f172a;
    padding:10px;
    border-radius:8px;
}

#deviceId{
    color:#22c55e;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2 style="color:#ff9800;">SOCIAL Q</h2>
<h3>Buy Passkey</h3>

<p class="sub">Select plan and pay</p>

<!-- USER INFO FORM -->
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<!-- PLAN -->
<div class="plan">
<label><input type="radio" name="plan" value="Weekly" checked> Weekly - ₦50</label>
</div>

<div class="plan">
<label><input type="radio" name="plan" value="Monthly"> Monthly - ₦1000</label>
</div>

<div class="plan">
<label><input type="radio" name="plan" value="Yearly"> Yearly - ₦10000</label>
</div>

<button class="payBtn" onclick="payNow()">Pay Now</button>

<p class="sub" style="margin-top:10px;">
If you have paid already, request your passkey below 👇
</p>

<button class="reqBtn" onclick="requestPasskey()">
Request Passkey
</button>

<div class="deviceBox" id="deviceBox">
<h3>Your Device ID</h3>
<p id="deviceId"></p>
</div>

<button class="backBtn" onclick="location.href='license.html'">
Back
</button>

</div>
</div>

<script>

/* =========================
LICENSE POOL (UNCHANGED)
========================= */
const LICENSE_POOL = {
"DEV-45389216":"947256",
"DEV-45389226":"182991",
"DEV-88391022":"550112",
"DEV-11223344":"778899"
};


/* =========================
DEVICE ID (ONLY FROM POOL)
========================= */
function getDeviceId(){

let id = localStorage.getItem("device_id");

if(!id){
    const keys = Object.keys(LICENSE_POOL);
    id = keys[Math.floor(Math.random() * keys.length)];
    localStorage.setItem("device_id", id);
}

return id;
}


/* =========================
GET PLAN AMOUNT
========================= */
function getAmount(){
const plan = document.querySelector('input[name="plan"]:checked').value;

if(plan === "Weekly") return 50;
if(plan === "Monthly") return 1000;
if(plan === "Yearly") return 10000;
}


/* =========================
PAYSTACK
========================= */
function payNow(){

const email = document.getElementById("email").value || "user@email.com";

const amount = getAmount();

const handler = PaystackPop.setup({

key: "pk_live_ff6f89169eb0390d93a0777c949d59a3982a21e4",
email: email,
amount: amount * 100,
currency: "NGN",

callback: function(response){

// SAVE PAYMENT INFO (NO RELIANCE FOR SECURITY)
localStorage.setItem("payment_status", "paid");
localStorage.setItem("payment_ref", response.reference);

// GET DEVICE
const device = getDeviceId();

// SHOW DEVICE ALWAYS
document.getElementById("deviceId").innerText = device;
document.getElementById("deviceBox").style.display = "block";

alert("Payment successful (you can now request passkey)");

},

onClose: function(){
alert("Payment window closed");
}

});

handler.openIframe();
}


/* =========================
REQUEST PASSKEY (ALWAYS ENABLED)
========================= */
function requestPasskey(){

const username = document.getElementById("username").value || "Unknown";
const email = document.getElementById("email").value || "Unknown";
const phone = document.getElementById("phone").value || "Unknown";

const plan = document.querySelector('input[name="plan"]:checked').value;
const ref = localStorage.getItem("payment_ref") || "NO-REF";
const device = getDeviceId();

const msg = `
Hello Admin,

I want my passkey.

Username: ${username}
Email: ${email}
Phone: ${phone}
Plan: ${plan}
Payment Ref: ${ref}
Device ID: ${device}

Please generate my license.
`;

window.open(
"https://wa.me/2347010067689?text=" + encodeURIComponent(msg),
"_blank"
);

}

</script>

</body>
</html>
