<title>Buy Passkey</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}

h2,h3{text-align:center;}

.sub{text-align:center;color:#94a3b8;}

.plan{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    margin-top:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:12px;
    font-size:16px;
    cursor:pointer;
}

.payBtn{background:#22c55e;color:white;}
.reqBtn{background:#f59e0b;color:black;}
.backBtn{background:#64748b;color:white;}

.popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#1e293b;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

<div class="card">

<h2>Buy Passkey</h2>

<p class="sub">Select plan and pay OR request passkey if already paid</p>

<div class="plan">
<label><input type="radio" name="plan" value="Weekly" checked> Weekly - ₦50</label>
</div>

<div class="plan">
<label><input type="radio" name="plan" value="Monthly"> Monthly - ₦1000</label>
</div>

<div class="plan">
<label><input type="radio" name="plan" value="Yearly"> Yearly - ₦10000</label>
</div>

<button class="payBtn" onclick="payNow()">Pay Now</button>

<p style="text-align:center;margin-top:10px;">
If you have paid, click below:
</p>

<button class="reqBtn" onclick="openRequestPopup()">
Request Passkey
</button>

<button class="backBtn" onclick="location.href='license.html'">
Back
</button>

</div>
</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">
<div class="popup-box">

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<button class="payBtn" onclick="submitRequest()">
Send Request
</button>

<button class="backBtn" onclick="closePopup()">

</div>

/* =========================
DEVICE ID (MUST EXIST ALREADY)
========================= */
function getDeviceId(){
    return localStorage.getItem("device_id");
}

/* =========================
PLAN PRICE
========================= */
function getAmount(){
    const plan=document.querySelector('input[name="plan"]:checked').value;
    if(plan=="Weekly") return 50;
    if(plan=="Monthly") return 1000;
    if(plan=="Yearly") return 10000;
}

/* =========================
PAYSTACK PAYMENT
========================= */
function payNow(){

const amount=getAmount();

const handler=PaystackPop.setup({
key:"pk_live_ff6f89169eb0390d93a0777c949d59a3982a21e4",

email:"user@email.com",

amount:amount*100,
currency:"NGN",

callback:function(response){

localStorage.setItem("payment_status","paid");
localStorage.setItem("payment_ref",response.reference);

alert("Payment successful. You can now request passkey.");

},

onClose:function(){
alert("Payment not completed");
}

});

handler.openIframe();
}

/* =========================
REQUEST BUTTON (IMPORTANT PART)
========================= */
function openRequestPopup(){

const status=localStorage.getItem("payment_status");

if(status!=="paid"){
    alert("You must complete payment first or contact admin.");
    return;
}

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* =========================
SEND REQUEST TO ADMIN
========================= */
function submitRequest(){

const device=getDeviceId();

if(!device){
    alert("No device found. Go back and register first.");
    return;
}

const data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
plan:document.querySelector('input[name="plan"]:checked').value,
deviceId:device,
paymentRef:localStorage.getItem("payment_ref")
};

const msg=`PASSKEY REQUEST:

Name: ${data.name}
Email: ${data.email}
Phone: ${data.phone}
Plan: ${data.plan}
Device ID: ${data.deviceId}
Payment Ref: ${data.paymentRef}

Please generate passkey using LICENSE_POOL.`;

window.open(
"https://wa.me/2347010067689?text="+encodeURIComponent(msg),
"_blank"
);

closePopup();

alert("Request sent to admin");
}
