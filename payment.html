/*==========================
GET DEVICE ID
===========================*/

function getDeviceId(){

    let id=localStorage.getItem("device_id");

    if(!id){

        const keys=Object.keys(LICENSE_POOL);

        id=keys[Math.floor(Math.random()*keys.length)];

        localStorage.setItem("device_id",id);

    }

    return id;

}


/*==========================
PLAN PRICE
===========================*/

function getAmount(){

    const plan=document.querySelector('input[name="plan"]:checked').value;

    if(plan=="Weekly") return 50;

    if(plan=="Monthly") return 1000;

    if(plan=="Yearly") return 10000;

}


/*==========================
PAYSTACK
===========================*/

function payNow(){
    alert('Do you want to pay now');

const amount=getAmount();

const handler=PaystackPop.setup({

key:"pk_live_ff6f89169eb0390d93a0777c949d59a3982a21e4",

email:localStorage.getItem("email") || "user@email.com",

amount:amount*100,

currency:"NGN",

callback:function(response){

localStorage.setItem("payment_status","paid");

localStorage.setItem("payment_ref",response.reference);

const device=getDeviceId();

document.getElementById("deviceId").innerHTML=device;

document.getElementById("deviceBox").style.display="block";

document.getElementById("copyBtn").style.display="block";

document.getElementById("waBtn").style.display="block";

alert("Payment Successful");

},

onClose:function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}


/*==========================
COPY DEVICE
===========================*/

function copyDevice(){

navigator.clipboard.writeText(getDeviceId());

alert("Device ID Copied");

}


/*==========================
WHATSAPP
===========================*/

function requestPasskey(){

const username=localStorage.getItem("username") || "Unknown";

const email=localStorage.getItem("email") || "Unknown";

const plan=document.querySelector('input[name="plan"]:checked').value;

const paymentRef=localStorage.getItem("payment_ref");

const msg=`Hello Admin,

I have completed payment.

Username: ${username}

Email: ${email}

Plan: ${plan}

Payment Ref: ${paymentRef}

Device ID: ${getDeviceId()}

Please generate my passkey.

`;

window.open(

"https://wa.me/2347010067689?text="+encodeURIComponent(msg),

"_blank"

);

}
